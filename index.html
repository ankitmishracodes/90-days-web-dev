<!DOCTYPE html>
<html>
    <head>
        <title>Internal CSS practice</title>
    <style>
        h1{
            color:blue;
            background-color:yellow;

        }
        p{
            color:green;
            font-size:20px;
            
        }
        body{
            background-color:lightgray;
        }
          </style>
    
    
    </head>
    <body>
        <section> 
        <h1>Internal CSS practice page</h1>
        </section>
        <hr>
        
        <p>
            This is a practice page for internal CSS. <br>
            Internal CSS is used to style HTML elements within the same HTML document. <br>
            It is defined within the <style> tag in the <head> section of the HTML document. <br>
            Internal CSS is useful for small projects or when you want to apply styles to a single page. <br>
            However, for larger projects, it is recommended to use external CSS files for better organization and maintainability.
        </p>
        
        
        <hr>
        
    </body>

</html>
